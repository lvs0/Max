<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Max — Jarvis Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            void: '#0a0a0f',
            orbIdle: '#00F5F5',
            orbSpeak: '#FFD700',
            silver: '#a0a0b0',
            softWhite: '#e0e0e8',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            orbitron: ['Orbitron', 'monospace'],
          },
        },
      },
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
    #root { width: 100vw; height: 100vh; }

    @keyframes orbPulse {
      0%, 100% { transform: scale(0.95); box-shadow: 0 0 40px #00F5F5, 0 0 80px rgba(0,245,245,0.3); }
      50% { transform: scale(1.05); box-shadow: 0 0 60px #00F5F5, 0 0 120px rgba(0,245,245,0.5); }
    }
    @keyframes orbSpeak {
      0%, 100% { transform: scale(1.0); box-shadow: 0 0 50px #FFD700, 0 0 100px rgba(255,215,0,0.4); }
      50% { transform: scale(1.15); box-shadow: 0 0 80px #FFD700, 0 0 160px rgba(255,215,0,0.6); }
    }
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes statFill {
      from { width: 0%; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .orb-idle { animation: orbPulse 2s ease-in-out infinite; }
    .orb-speak { animation: orbSpeak 1.2s ease-in-out infinite; }
    .panel-in { animation: panelIn 0.6s ease-out forwards; }
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .glass:hover { border-color: rgba(255, 255, 255, 0.15); }
    .scroll-glass::-webkit-scrollbar { width: 4px; }
    .scroll-glass::-webkit-scrollbar-track { background: transparent; }
    .scroll-glass::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─── Particle Canvas ───────────────────────────────────────────────────────
    function ParticleCanvas() {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = Array.from({ length: 40 }, () => ({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 4 + 2,
          dx: (Math.random() - 0.5) * 0.4,
          dy: (Math.random() - 0.5) * 0.4,
          opacity: Math.random() * 0.4 + 0.2,
          color: Math.random() > 0.7 ? '#00F5F5' : '#ffffff',
        }));

        let anim;
        function draw() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.opacity;
            ctx.fill();
            p.x += p.dx; p.y += p.dy;
            if (p.y < -10) p.y = canvas.height + 10;
            if (p.x < -10) p.x = canvas.width + 10;
            if (p.x > canvas.width + 10) p.x = -10;
          });
          ctx.globalAlpha = 1;
          anim = requestAnimationFrame(draw);
        }
        draw();
        const handleResize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        };
        window.addEventListener('resize', handleResize);
        return () => { cancelAnimationFrame(anim); window.removeEventListener('resize', handleResize); };
      }, []);

      return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-0" style={{ opacity: 0.6 }} />;
    }

    // ─── Orb ───────────────────────────────────────────────────────────────────
    function Orb({ speaking }) {
      return (
        <div className="flex flex-col items-center gap-4">
          <div
            onClick={() => {}}
            className={`rounded-full cursor-pointer transition-all duration-500 flex items-center justify-center
              ${speaking ? 'orb-speak bg-orbSpeak' : 'orb-idle bg-orbIdle'}`}
            style={{
              width: 160, height: 160,
              border: `3px solid ${speaking ? '#FFD700' : '#00F5F5'}`,
            }}
          >
            <span className="font-orbitron text-void font-bold text-lg tracking-widest uppercase">
              MAX
            </span>
          </div>
          <span className={`font-orbitron text-sm tracking-widest uppercase transition-colors duration-500 ${speaking ? 'text-orbSpeak' : 'text-orbIdle'}`}>
            {speaking ? 'Speaking' : 'Listening'}
            <span className="ml-1 animate-[blink_1s_ease-in-out_infinite]">●</span>
          </span>
        </div>
      );
    }

    // ─── Glass Panel ───────────────────────────────────────────────────────────
    function GlassPanel({ title, children, className = '' }) {
      return (
        <div className={`glass rounded-2xl p-4 panel-in ${className}`}>
          {title && <h3 className="font-orbitron text-xs tracking-widest text-orbIdle uppercase mb-3">{title}</h3>}
          {children}
        </div>
      );
    }

    // ─── Task Item ─────────────────────────────────────────────────────────────
    function TaskItem({ text, done, priority }) {
      const colors = { high: 'bg-red-400', medium: 'bg-yellow-400', low: 'bg-green-400' };
      return (
        <div className="flex items-center gap-3 py-2 border-b border-white/5 last:border-0">
          <div className={`w-4 h-4 rounded border flex-shrink-0 flex items-center justify-center
            ${done ? 'bg-orbIdle border-orbIdle' : 'border-white/20'}`}>
            {done && <svg className="w-2.5 h-2.5 text-void" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7" /></svg>}
          </div>
          <span className={`text-sm flex-1 ${done ? 'line-through text-silver/50' : 'text-softWhite/80'}`}>{text}</span>
          <div className={`w-2 h-2 rounded-full flex-shrink-0 ${colors[priority] || colors.medium}`} />
        </div>
      );
    }

    // ─── Stat Bar ──────────────────────────────────────────────────────────────
    function StatBar({ label, value, color = 'from-orbIdle to-purple-500' }) {
      return (
        <div className="mb-3">
          <div className="flex justify-between text-xs mb-1">
            <span className="text-silver">{label}</span>
            <span className="text-softWhite font-medium">{value}%</span>
          </div>
          <div className="h-1.5 bg-white/10 rounded-full overflow-hidden">
            <div
              className={`h-full rounded-full bg-gradient-to-r ${color} transition-all duration-1000`}
              style={{ width: `${value}%` }}
            />
          </div>
        </div>
      );
    }

    // ─── Calendar Event ────────────────────────────────────────────────────────
    function CalendarEvent({ time, title, type = 'default' }) {
      const colors = {
        default: 'border-l-orbIdle',
        meeting: 'border-l-orbSpeak',
        task: 'border-l-purple-400',
      };
      return (
        <div className={`flex gap-3 py-2 border-b border-white/5 last:border-0 border-l-2 ${colors[type]} pl-2`}>
          <span className="text-xs text-silver flex-shrink-0 w-12 pt-0.5">{time}</span>
          <span className="text-sm text-softWhite/80">{title}</span>
        </div>
      );
    }

    // ─── Quick Action Button ────────────────────────────────────────────────────
    function QuickAction({ icon, label, onClick }) {
      return (
        <button
          onClick={onClick}
          className="glass rounded-2xl p-4 flex flex-col items-center gap-2 hover:border-orbIdle/40 transition-all duration-300 cursor-pointer group"
        >
          <span className="text-2xl group-hover:scale-110 transition-transform">{icon}</span>
          <span className="text-xs text-silver font-medium">{label}</span>
        </button>
      );
    }

    // ─── Chat Bar ───────────────────────────────────────────────────────────────
    function ChatBar({ onSend }) {
      const [val, setVal] = useState('');
      const handleSend = () => {
        if (!val.trim()) return;
        onSend(val.trim());
        setVal('');
      };
      return (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-2xl px-6 z-20">
          <div className="glass rounded-full flex items-center px-5 py-3 gap-3 shadow-2xl">
            <input
              value={val}
              onChange={e => setVal(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleSend()}
              placeholder="Ask Max anything..."
              className="flex-1 bg-transparent text-softWhite placeholder-silver/50 text-sm outline-none"
            />
            <button
              onClick={handleSend}
              className="w-8 h-8 rounded-full bg-orbIdle/20 flex items-center justify-center text-orbIdle hover:bg-orbIdle hover:text-void transition-all flex-shrink-0"
            >
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
            </button>
          </div>
        </div>
      );
    }

    // ─── Left Sidebar ───────────────────────────────────────────────────────────
    function LeftSidebar() {
      const tasks = [
        { text: 'Finalize Q2 strategy deck', done: true, priority: 'high' },
        { text: 'Review API integration docs', done: false, priority: 'high' },
        { text: 'Team standup at 10:00', done: false, priority: 'medium' },
        { text: 'Update project timeline', done: false, priority: 'low' },
        { text: 'Code review — auth module', done: false, priority: 'medium' },
      ];
      const planSteps = [
        { label: 'Research', pct: 80 },
        { label: 'Design', pct: 45 },
        { label: 'Development', pct: 20 },
        { label: 'Testing', pct: 0 },
      ];
      return (
        <div className="w-64 flex-shrink-0 flex flex-col gap-4 overflow-y-auto scroll-glass px-2 py-4">
          {/* Logo */}
          <div className="flex items-center gap-3 px-2">
            <div className="w-10 h-10 rounded-xl bg-orbIdle/20 border border-orbIdle/40 flex items-center justify-center">
              <span className="font-orbitron font-black text-orbIdle text-sm">M</span>
            </div>
            <div>
              <div className="font-orbitron font-bold text-softWhite text-sm tracking-widest">MAX</div>
              <div className="text-xs text-silver">AI Assistant</div>
            </div>
          </div>

          <GlassPanel title="Tasks">
            {tasks.map((t, i) => <TaskItem key={i} {...t} />)}
          </GlassPanel>

          <GlassPanel title="Current Plan">
            <div className="space-y-3">
              {planSteps.map((s, i) => (
                <div key={i}>
                  <div className="flex justify-between text-xs mb-1">
                    <span className="text-silver">{s.label}</span>
                    <span className="text-softWhite">{s.pct}%</span>
                  </div>
                  <div className="h-1.5 bg-white/10 rounded-full overflow-hidden">
                    <div
                      className="h-full rounded-full bg-gradient-to-r from-orbIdle to-purple-400 transition-all duration-1000"
                      style={{ width: `${s.pct}%` }}
                    />
                  </div>
                </div>
              ))}
            </div>
          </GlassPanel>
        </div>
      );
    }

    // ─── Right Sidebar ──────────────────────────────────────────────────────────
    function RightSidebar() {
      const [cpu, setCpu] = useState(0);
      const [mem, setMem] = useState(0);
      const events = [
        { time: '10:00', title: 'Team Standup', type: 'meeting' },
        { time: '12:30', title: 'Lunch Break', type: 'default' },
        { time: '14:00', title: 'Sprint Review', type: 'meeting' },
        { time: '16:00', title: 'Max — daily brief', type: 'task' },
        { time: '18:00', title: 'Gym session', type: 'default' },
      ];

      useEffect(() => {
        const interval = setInterval(() => {
          setCpu(Math.floor(Math.random() * 30 + 20));
          setMem(Math.floor(Math.random() * 20 + 45));
        }, 2000);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="w-72 flex-shrink-0 flex flex-col gap-4 overflow-y-auto scroll-glass px-2 py-4">
          <GlassPanel title="Planning">
            {events.map((e, i) => <CalendarEvent key={i} {...e} />)}
          </GlassPanel>

          <GlassPanel title="System">
            <StatBar label="CPU Load" value={cpu} color="from-orbIdle to-green-400" />
            <StatBar label="Memory" value={mem} color="from-purple-400 to-orbSpeak" />
            <StatBar label="Network" value={62} color="from-orbSpeak to-red-400" />
            <div className="flex justify-between items-center mt-2 pt-2 border-t border-white/5">
              <span className="text-xs text-silver">Uptime</span>
              <span className="text-xs font-orbitron text-orbIdle">99.9%</span>
            </div>
          </GlassPanel>

          <GlassPanel title="Quick Stats">
            <div className="grid grid-cols-2 gap-3">
              {[
                { label: 'Tasks Done', value: '12' },
                { label: 'This Week', value: '48h' },
                { label: 'Focus Score', value: '94' },
                { label: 'Streak', value: '7d' },
              ].map((s, i) => (
                <div key={i} className="text-center">
                  <div className="font-orbitron font-bold text-lg text-softWhite">{s.value}</div>
                  <div className="text-xs text-silver">{s.label}</div>
                </div>
              ))}
            </div>
          </GlassPanel>
        </div>
      );
    }

    // ─── Center Content ──────────────────────────────────────────────────────────
    function CenterContent({ speaking, onToggleSpeak }) {
      const actions = [
        { icon: '🌤️', label: 'Weather', onClick: () => {} },
        { icon: '📰', label: 'News', onClick: () => {} },
        { icon: '⏱️', label: 'Timer', onClick: () => {} },
        { icon: '⚙️', label: 'Settings', onClick: () => {} },
      ];
      return (
        <div className="flex-1 flex flex-col items-center justify-center gap-10 relative z-10">
          {/* Orb */}
          <Orb speaking={speaking} />

          {/* Quick Actions */}
          <div className="grid grid-cols-4 gap-4">
            {actions.map((a, i) => <QuickAction key={i} {...a} />)}
          </div>

          {/* Orb state toggle hint */}
          <button
            onClick={onToggleSpeak}
            className="text-xs text-silver/50 hover:text-silver transition-colors mt-2"
          >
            Click orb to toggle state
          </button>
        </div>
      );
    }

    // ─── Chat Messages ──────────────────────────────────────────────────────────
    function ChatMessages({ messages }) {
      return (
        <div className="fixed bottom-20 left-1/2 -translate-x-1/2 w-full max-w-2xl px-6 z-20 flex flex-col gap-2 pointer-events-none">
          {messages.map((m, i) => (
            <div key={i} className={`flex ${m.from === 'user' ? 'justify-end' : 'justify-start'}`}>
              <div className={`max-w-xs rounded-2xl px-4 py-2 text-sm ${
                m.from === 'user'
                  ? 'bg-orbIdle/20 border border-orbIdle/30 text-softWhite rounded-br-sm'
                  : 'glass text-softWhite/80 rounded-bl-sm'
              }`}>
                {m.text}
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ─── App ─────────────────────────────────────────────────────────────────────
    function App() {
      const [speaking, setSpeaking] = useState(false);
      const [messages, setMessages] = useState([
        { from: 'max', text: 'Hello! I am Max, your personal AI assistant. How can I help you today?' },
      ]);

      const handleSend = (text) => {
        setMessages(prev => [...prev, { from: 'user', text }]);
        setSpeaking(true);
        setTimeout(() => {
          setMessages(prev => [...prev, { from: 'max', text: `You said: "${text}". I'm processing that now...` }]);
          setSpeaking(false);
        }, 1500);
      };

      return (
        <div className="w-full h-full flex relative">
          <ParticleCanvas />

          {/* Left */}
          <LeftSidebar />

          {/* Center */}
          <CenterContent speaking={speaking} onToggleSpeak={() => setSpeaking(s => !s)} />

          {/* Right */}
          <RightSidebar />

          {/* Chat */}
          <ChatMessages messages={messages} />
          <ChatBar onSend={handleSend} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
